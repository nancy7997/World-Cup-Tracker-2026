        function syncFromFirebase(){
            const statusEl=document.getElementById('syncStatus');
            statusEl.textContent='🟡 Syncing...';
            statusEl.className='sync-status';
            onValue(scoresRef,(snapshot)=>{
                const data=snapshot.val()||{};
                allGames.forEach(g=>{
                    if(data[g.id]!==undefined){
                        g.homeScore=data[g.id].homeScore;
                        g.awayScore=data[g.id].awayScore;
                    }
                });
                statusEl.textContent='🟢 Live Sync Connected';
                statusEl.className='sync-status';
                renderAll();
            },(error)=>{
                statusEl.textContent='🔴 Sync Error';
                statusEl.className='sync-status offline';
                console.error('Firebase sync error:',error);
                renderAll();
            });
        }

        function saveToFirebase(gameId,homeScore,awayScore){
            const updates={};
            updates[gameId]={homeScore,awayScore};
            update(scoresRef,updates).catch(err=>console.error('Save error:',err));
        }

        function initializeDefaultScores(){
            get(scoresRef).then(snapshot=>{
                if(!snapshot.exists()){
                    const defaults={};
                    allGroupGames.forEach(g=>{
                        if(g.homeScore!==null||g.awayScore!==null){
                            defaults[g.id]={homeScore:g.homeScore,awayScore:g.awayScore};
                        }
                    });
                    if(Object.keys(defaults).length>0) set(scoresRef,defaults);
                }
            });
        }
        initializeDefaultScores();
        syncFromFirebase();

        function renderCalendar(){
            const strip=document.getElementById('calendarStrip');
            const dates=new Set(allGames.map(g=>g.date));
            const s=new Date(2026,5,11),e=new Date(2026,6,19);
            const m=['Jun','Jul'];let h='';const c=new Date(s);
            while(c<=e){const ds=c.toISOString().split('T')[0];h+=`<div class="cal-day${dates.has(ds)?' has-games':''}${selectedDate===ds?' selected':''}${ds==='2026-06-13'?' today':''}" data-date="${ds}"><span style="font-size:.48em;">${m[c.getMonth()-5]}</span><span class="day-num">${c.getDate()}</span></div>`;c.setDate(c.getDate()+1);}
            strip.innerHTML=h;
            strip.querySelectorAll('.cal-day').forEach(el=>el.addEventListener('click',()=>{
                const d=el.dataset.date;
                if(selectedDate===d){selectedDate=null;renderCalendar();renderAll();document.getElementById('dailyOverlay').classList.remove('open');}
                else{selectedDate=d;renderCalendar();renderAll();openDailyModal(d);}
            }));
        }

        function openDailyModal(dateStr){
            const overlay=document.getElementById('dailyOverlay'),modal=document.getElementById('dailyModal');
            const dayGames=allGames.filter(g=>g.date===dateStr);
            const dateObj=new Date(dateStr+'T00:00:00');
            const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const mn=['January','February','March','April','May','June','July'];
            let h=`<h3>📅 ${dn[dateObj.getUTCDay()]}, ${mn[dateObj.getUTCMonth()]} ${dateObj.getUTCDate()}, 2026</h3>`;
            h+=`<div class="daily-date">${dayGames.length} match${dayGames.length!==1?'es':''}</div>`;
            if(dayGames.length===0)h+=`<div class="daily-empty">No matches today.</div>`;
            else dayGames.forEach(game=>{
                const sc=game.homeScore!==null&&game.awayScore!==null;
                h+=`<div class="daily-game-card" data-game-id="${game.id}"><div class="match-info"><div class="teams-line">${game.home} vs ${game.away}</div><div class="details-line">${game.round==='group'?'Group '+game.group:game.round} · ${game.stadium}</div><div class="details-line">🕐 ${game.time} (${game.pst})</div></div><div class="score-badge${!sc?' pending':''}">${sc?game.homeScore+' - '+game.awayScore:'vs'}</div></div>`;
            });
            h+=`<button class="daily-close-btn" id="dailyCloseBtn">✕ Close</button>`;
            modal.innerHTML=h;overlay.classList.add('open');
            document.getElementById('dailyCloseBtn').addEventListener('click',()=>overlay.classList.remove('open'));
            modal.querySelectorAll('.daily-game-card').forEach(c=>c.addEventListener('click',()=>{overlay.classList.remove('open');openGameModal(c.dataset.gameId);}));
        }

        function getFilteredGames(){return selectedDate?allGames.filter(g=>g.date===selectedDate):allGames;}

        function calculateStandings(gid){
            const teams=GROUPS[gid],stats={};
            teams.forEach(t=>{stats[t]={team:t,person:peopleMap[t]||'',gp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
            allGroupGames.filter(g=>g.group===gid).forEach(g=>{
                if(g.homeScore!==null&&g.awayScore!==null&&stats[g.home]&&stats[g.away]){
                    stats[g.home].gp++;stats[g.away].gp++;stats[g.home].gf+=g.homeScore;stats[g.home].ga+=g.awayScore;stats[g.away].gf+=g.awayScore;stats[g.away].ga+=g.homeScore;
                    if(g.homeScore>g.awayScore){stats[g.home].w++;stats[g.home].pts+=3;stats[g.away].l++;}
                    else if(g.homeScore<g.awayScore){stats[g.away].w++;stats[g.away].pts+=3;stats[g.home].l++;}
                    else{stats[g.home].d++;stats[g.away].d++;stats[g.home].pts+=1;stats[g.away].pts+=1;}
                }
            });
            Object.values(stats).forEach(s=>{s.gd=s.gf-s.ga;});
            return Object.values(stats).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
        }

        function getAllThirdPlaceTeams(){
            const thirds=[];
            Object.keys(GROUPS).forEach(gid=>{const s=calculateStandings(gid);if(s.length>=3)thirds.push({...s[2],group:gid});});
            return thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
        }

            });
            container.innerHTML=h;
            container.querySelectorAll('.ko-game').forEach(r=>r.addEventListener('click',()=>openGameModal(r.dataset.gameId)));
        }

        function openGameModal(gameId){
            const game=allGames.find(g=>g.id===gameId);if(!game)return;
            const overlay=document.getElementById('modalOverlay'),modal=document.getElementById('gameModal');
            const hs=game.homeScore!==null?game.homeScore:'',as=game.awayScore!==null?game.awayScore:'';
            modal.innerHTML=`<h3>${game.round==='group'?'Group '+game.group+' · ':''}${game.home} vs ${game.away}</h3><div class="modal-date">📅 ${game.date} | 🏟 ${game.stadium} | 🕐 ${game.time} (${game.pst})</div><div class="matchup"><div class="team-block"><div style="font-size:2em;">⚽</div><div class="country">${game.home}</div><div class="owner">${peopleMap[game.home]||''}</div></div><div class="vs">VS</div><div class="team-block"><div style="font-size:2em;">⚽</div><div class="country">${game.away}</div><div class="owner">${peopleMap[game.away]||''}</div></div></div><div class="score-inputs"><input type="number" id="modalHomeScore" value="${hs}" placeholder="-" min="0" max="99"><span>—</span><input type="number" id="modalAwayScore" value="${as}" placeholder="-" min="0" max="99"></div><div class="btn-row"><button class="btn btn-save" id="modalSave">💾 Save</button><button class="btn btn-reset" id="modalReset">Clear</button><button class="btn btn-close" id="modalClose">Close</button></div>`;
            overlay.classList.add('open');
            document.getElementById('modalSave').addEventListener('click',()=>{
                const hv=document.getElementById('modalHomeScore').value,av=document.getElementById('modalAwayScore').value;
                if(hv!==''&&av!==''&&!isNaN(hv)&&!isNaN(av)){game.homeScore=parseInt(hv);game.awayScore=parseInt(av);}
                else if(hv===''&&av===''){game.homeScore=null;game.awayScore=null;}
                saveToFirebase(game.id,game.homeScore,game.awayScore);
                overlay.classList.remove('open');
            });
            document.getElementById('modalReset').addEventListener('click',()=>{game.homeScore=null;game.awayScore=null;saveToFirebase(game.id,null,null);overlay.classList.remove('open');});
            document.getElementById('modalClose').addEventListener('click',()=>overlay.classList.remove('open'));
        }
        document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

        function renderAll(){
            document.getElementById('filterBanner').innerHTML=selectedDate?`🔍 Showing <strong>${selectedDate}</strong> <span class="clear-filter" id="clearFilter">[Show All]</span>`:`📅 Click a date to see games · 🔴 Live Sync Active`;
            if(selectedDate)document.getElementById('clearFilter').addEventListener('click',()=>{selectedDate=null;renderCalendar();renderAll();document.getElementById('dailyOverlay').classList.remove('open');});
            if(currentView==='groups')renderGroups();else if(currentView==='thirdplace')renderThirdPlace();else renderKnockout();
        }

        document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentView=btn.dataset.view;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+currentView).classList.add('active');renderAll();});});

        renderCalendar();
        renderAll();
    </script>
</body>
</html>
